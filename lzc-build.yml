buildscript: |
  set -e
  rootfs="$(nix build .#attic-lazycat-rootfs --no-link --print-out-paths)"
  mkdir -p build
  if [ -e build/rootfs ]; then
    chmod -R u+w build/rootfs
    rm -rf build/rootfs
  fi
  cp -R "$rootfs" build/rootfs

manifest: ./lzc-manifest.yml
pkgout: ./build
images:
  attic:
    builder: remote
    dockerfile: ./Dockerfile.lzc
    context: .
    upstream-match: registry.lazycat.cloud
