name: Build LazyCat LPK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and publish LPK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build LazyCat LPK
        run: nix build .#lpk --print-build-logs

      - name: Collect single LPK
        run: |
          set -euo pipefail
          mkdir -p dist
          cp result/*.lpk dist/
          count="$(find dist -maxdepth 1 -type f -name '*.lpk' | wc -l)"
          test "$count" = "1"
          lpk="$(find dist -maxdepth 1 -type f -name '*.lpk' | head -n 1)"
          tar -tf "$lpk" | grep -qx 'package.yml'
          tar -tf "$lpk" | grep -qx 'manifest.yml'
          ls -lh dist

      - name: Select release tag
        id: release
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="latest"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish LPK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          lpk="$(find dist -maxdepth 1 -type f -name '*.lpk' | head -n 1)"
          if [ "$RELEASE_TAG" = "latest" ]; then
            git tag -f latest "$GITHUB_SHA"
            git push origin refs/tags/latest --force
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$lpk" --clobber
          else
            gh release create "$RELEASE_TAG" "$lpk" \
              --target "$GITHUB_SHA" \
              --title "Lazy Attic LPK ${RELEASE_TAG}" \
              --notes "Automated LazyCat LPK build for ${GITHUB_SHA}."
          fi
